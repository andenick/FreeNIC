# GoAccess config for parsing Caddy JSON access logs (Carson Telemetry Standard
# Layer 1). Caddy's `format json` emits one JSON object per line with the schema
# below; GoAccess parses it with these log/date/time formats.
#
# Usage (Tailscale-only static report):
#   goaccess /var/log/caddy/methodex.json --config-file=goaccess.conf \
#            -o /var/lib/carson/goaccess/methodex.html
# Real-time (websocket bound to the tailnet IP only — NEVER 0.0.0.0):
#   goaccess /var/log/caddy/methodex.json --config-file=goaccess.conf \
#            -o /var/lib/carson/goaccess/methodex.html --real-time-html \
#            --ws-url=wss://<box>.<tailnet>.ts.net:7890 --addr=100.x.y.z --port=7890

# --- Caddy JSON log format -------------------------------------------------
# A Caddy access-log line looks like:
# {"ts":1717592602.123,"request":{"method":"GET","uri":"/v1/x","proto":"HTTP/2.0",
#   "host":"methodex.io","headers":{"User-Agent":["..."],"Referer":["..."]},
#   "remote_ip":"1.2.3.4"},"status":200,"size":1234,"duration":0.0123}
#
# GoAccess JSON parsing uses dotted key paths; arrays use [n].
log-format       {"ts":"%x.%^","request":{"method":"%m","uri":"%U","proto":"%H","host":"%v","headers":{"User-Agent":["%u"],"Referer":["%R"]},"remote_ip":"%h"},"status":"%s","size":"%b","duration":"%T"}

# Caddy `ts` is a Unix epoch (seconds.fraction). %x consumes the epoch seconds;
# date-format / time-format below tell GoAccess it is a timestamp.
date-format      %s
time-format      %s

# --- Privacy: anonymize client IPs in the report (Layer-1 hashing) ---------
# GoAccess can anonymize IPs so the edge report never shows a raw address,
# matching the §6 "no raw IP" posture. (App layer hashing is separate.)
anonymize-ip     true
anonymize-level  3

# --- Report behaviour ------------------------------------------------------
real-time-html   false
html-report-title Carson Edge Traffic (Caddy)
no-query-string  true
4xx-to-unique    false
ignore-crawlers  false
http-method      yes
http-protocol    yes

# Restrict the panels to what we care about (paths, status, time).
# (Comment out to enable all default panels.)
